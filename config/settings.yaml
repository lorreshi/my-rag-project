# Smart Knowledge Hub — Main Configuration
# See DEV_SPEC.md §5.5 for full reference.

llm:
  provider: azure           # azure | openai | ollama | deepseek
  model: gpt-4o
  azure_endpoint: ""
  api_key: ""

embedding:
  provider: openai          # openai | azure | ollama
  model: text-embedding-3-small

vision_llm:
  provider: azure           # azure | dashscope
  model: gpt-4o

vector_store:
  backend: chroma           # chroma | qdrant | pinecone
  persist_path: ./data/db/chroma

retrieval:
  sparse_backend: bm25      # bm25 | elasticsearch
  fusion_algorithm: rrf     # rrf | weighted_sum
  top_k_dense: 20
  top_k_sparse: 20
  top_k_final: 10

rerank:
  backend: cross_encoder    # none | cross_encoder | llm
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_m: 30

evaluation:
  backends:
    - ragas
    - custom

observability:
  enabled: true
  log_file: ./logs/traces.jsonl

dashboard:
  enabled: true
  port: 8501
  traces_dir: ./logs
  auto_refresh: true
  refresh_interval: 5
